name: Update filtered Russia list (no YouTube)

on:
  schedule:
    - cron: '*/15 * * * *'          # каждые 15 минут
  push:
    branches:
      - main
    paths:
      - 'scripts/filter_and_check.sh'
  workflow_dispatch:                 # ручной запуск

# Разрешаем пуш обратно в репозиторий
permissions:
  contents: write

jobs:
  update-list:
    runs-on: ubuntu-latest

    steps:
      # Шаг 1: Клонируем репозиторий (используем последнюю стабильную версию checkout)
      - name: Checkout репозитория
        uses: actions/checkout@v6        

      # Шаг 2: Запускаем скрипт фильтрации (он сам проверит хеши и создаст новый файл при необходимости)
      - name: Запуск скрипта фильтрации
        run: |
          chmod +x scripts/filter_and_check.sh
          ./scripts/filter_and_check.sh

      # Шаг 3: Определяем, были ли реальные изменения в итоговом файле или в .last_checksums
      - name: Проверка изменений
        id: changes
        run: |
          git diff --quiet russia-inside-noyoutube.lst .last_checksums || echo "changed=true" >> $GITHUB_OUTPUT

      # Шаг 4: Если изменения есть – коммитим и пушим
      - name: Коммит и пуш
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add russia-inside-noyoutube.lst .last_checksums
          git commit -m "Автообновление: изменения в исходных списках [skip ci]"
          git push

      # Шаг 5: Отправляем уведомление в Telegram (только если были изменения)
      - name: Уведомление в Telegram
        if: steps.changes.outputs.changed == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MESSAGE="🔔 *Обновлён список доменов*%0A%0A📁 \`russia-inside-noyoutube.lst\`%0A🔗 [Смотреть файл](https://github.com/${{ github.repository }}/blob/main/russia-inside-noyoutube.lst)%0A📦 [Коммит](https://github.com/${{ github.repository }}/commit/${{ github.sha }})"
          curl -s -X POST https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage \
            -d chat_id=${TELEGRAM_CHAT_ID} \
            -d parse_mode=Markdown \
            -d text="${MESSAGE}"
