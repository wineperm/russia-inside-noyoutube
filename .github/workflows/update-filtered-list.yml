name: Update filtered Russia list (no YouTube)

on:
  schedule:
    # Каждые 15 минут (минимальный интервал для бесплатных аккаунтов ~5-15 минут)
    - cron: '*/15 * * * *'
  push:
    branches:
      - main
    paths:
      - 'scripts/filter_and_check.sh'
  workflow_dispatch:  # ручной запуск

jobs:
  update-list:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Запуск скрипта фильтрации с проверкой изменений
        run: |
          chmod +x scripts/filter_and_check.sh
          ./scripts/filter_and_check.sh

      - name: Проверка, есть ли изменения для коммита
        id: check_changes
        run: |
          git diff --quiet russia-inside-noyoutube.lst .last_checksums || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Коммит и пуш обновлений
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add russia-inside-noyoutube.lst .last_checksums
          git commit -m "Автообновление: изменения в исходных списках [skip ci]"
          git push
