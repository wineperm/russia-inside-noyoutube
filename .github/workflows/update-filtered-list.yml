name: Update filtered Russia list (no YouTube)

on:
  schedule:
    - cron: '*/15 * * * *'
  push:
    branches:
      - main
    paths:
      - 'scripts/filter_and_check.sh'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-list:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4

      - name: Запуск скрипта фильтрации
        run: |
          chmod +x scripts/filter_and_check.sh
          ./scripts/filter_and_check.sh

      - name: Проверка изменений
        id: changes
        run: |
          git diff --quiet russia-inside-noyoutube.lst .last_checksums || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Коммит и пуш
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add russia-inside-noyoutube.lst .last_checksums
          git commit -m "Автообновление: изменения в исходных списках [skip ci]"
          git push

      - name: Уведомление в Telegram
        if: steps.changes.outputs.changed == 'true'
        uses: appleboy/telegram-action@v1.1.0   # 👈 исправленная версия
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            🔔 **Обновлён список доменов**
            
            📁 `russia-inside-noyoutube.lst`
            🕒 ${{ github.event.repository.updated_at }}
            🔗 [Смотреть файл](https://github.com/${{ github.repository }}/blob/main/russia-inside-noyoutube.lst)
            📦 [Коммит](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
